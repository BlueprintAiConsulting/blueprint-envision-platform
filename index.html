    <!-- Open Graph -->

  <style>
    #splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0A0E17;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s ease;
      background-image: radial-gradient(#1E293B 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
    .splash-logo-icon {
      width: 48px; height: 48px; background: #3B82F6; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(59,130,246,0.6);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    .splash-logo-icon svg { width: 26px; height: 26px; color: white; }
    .splash-logo-text { font-family: system-ui, -apple-system, sans-serif; }
    .splash-logo-text h1 { font-size: 24px; font-weight: 800; color: white; letter-spacing: -0.5px; margin:0; }
    .splash-logo-text h1 span { color: #3B82F6; }
    .splash-logo-text p { font-size: 10px; font-weight: 700; color: #475569; letter-spacing: 0.2em; text-transform: uppercase; margin: 2px 0 0; }
    .splash-bar-wrap { width: 280px; height: 2px; background: #1E293B; border-radius: 99px; overflow: hidden; margin-bottom: 20px; }
    .splash-bar { height: 100%; background: linear-gradient(90deg, #3B82F6, #60A5FA); border-radius: 99px; animation: load-bar 4s ease-out forwards; }
    .splash-status { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; color: #475569; letter-spacing: 0.15em; text-transform: uppercase; }
    @keyframes load-bar { 0% { width: 0% } 30% { width: 40% } 60% { width: 70% } 85% { width: 88% } 100% { width: 95% } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 20px rgba(59,130,246,0.5); } 50% { box-shadow: 0 0 40px rgba(59,130,246,0.9); } }
  </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-logo">
        <div class="splash-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
          </svg>
        </div>
        <div class="splash-logo-text">
          <h1>BLUEPRINT<span>ENVISION</span></h1>
          <p>Exterior Visualizer</p>
        </div>
      </div>
      <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
      <div class="splash-status" id="splash-status">Initializing AI Engine...</div>
    </div>
    <div id="root"></div>
    <script>
      const msgs = ['Initializing AI Engine...','Loading material catalog...','Preparing visualization tools...','Almost ready...'];
      let i = 0;
      const el = document.getElementById('splash-status');
      const iv = setInterval(() => { i++; if(i < msgs.length && el) el.textContent = msgs[i]; else clearInterval(iv); }, 1200);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
